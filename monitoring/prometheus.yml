global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'amd-router-monitor'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - job_name: 'amd_router_backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
