server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Long-lived cache for hashed Vite assets (js, css, images)
    location ~* \.(?:js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → FastAPI backend ───────────────────────────────────────────
    # Strips /api prefix before forwarding, e.g.:
    #   GET /api/health  →  GET http://backend:8000/health
    #   POST /api/process →  POST http://backend:8000/process
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All other routes serve index.html so React Router handles navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}
